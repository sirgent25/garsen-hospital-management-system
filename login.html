<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System - Login</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body>
<body>

    <div class="container">

        <div class="login-box">

            <div class="logo-container">
                <img
                    src="images/logo.png"
                    alt="Garsen Hospital Logo"
                    class="hospital-logo"
                >

                <h1>Garsen Hospital</h1>
                <p class="hospital-tagline">
                    caring for life , serving with compassion
                </p>
            </div>

            <h2>Patient Login</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <p>
                Don't have an account?
                <a href="index.html">Register Here</a>
            </p>

        </div>

    </div>

    <script type="module" src="login.js"></script>

</body>
