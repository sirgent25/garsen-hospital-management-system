<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garsen Hospital Appointment</title>

    <link rel="stylesheet" href="appointments.css">
</head>
<body>

<div class="container">

    <!-- Booking Form -->
    <div class="appointment-card">

        <div class="header">
            <h1>Book an Appointment</h1>
            <p>Garsen Hospital</p>
        </div>

        <form id="appointmentForm">

            <!-- Patient Name -->
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input
                    type="text"
                    id="fullName"
                    readonly
                >
            </div>

            <!-- Patient Email -->
            <div class="input-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    readonly
                >
            </div>

            <!-- Selected Doctor -->
            <div class="selected-doctor">

                <h3>Selected Doctor</h3>

                <div class="doctor-info">

                    <p>
                        <strong>Name:</strong>
                        <span id="doctorName">No doctor selected</span>
                    </p>

                    <p>
                        <strong>Department:</strong>
                        <span id="doctorDepartment">-</span>
                    </p>

                    <p>
                        <strong>Specialization:</strong>
                        <span id="doctorSpecialization">-</span>
                    </p>

                    <p>
                        <strong>Email:</strong>
                        <span id="doctorEmail">-</span>
                    </p>

                    <p>
                        <strong>Phone:</strong>
                        <span id="doctorPhone">-</span>
                    </p>

                    <p>
                        <strong>Status:</strong>
                        <span id="doctorStatus">-</span>
                    </p>

                </div>

            </div>

            <!-- Appointment Date & Time -->
            <div class="row">

                <div class="input-group">

                    <label for="date">Appointment Date</label>

                    <input
                        type="date"
                        id="date"
                        required
                    >

                </div>

                <div class="input-group">

                    <label for="time">Appointment Time</label>

                    <input
                        type="time"
                        id="time"
                        required
                    >

                </div>

            </div>

            <!-- Reason -->
            <div class="input-group">

                <label for="reason">

                    Reason for Visit

                </label>

                <textarea

                    id="reason"

                    rows="5"

                    placeholder="Describe your symptoms or reason for your visit..."

                    required

                ></textarea>

            </div>

            <!-- Submit -->
            <button type="submit" id="bookBtn">

                Book Appointment

            </button>

        </form>

    </div>

    <!-- Appointment History -->
    <div class="appointments-list">

        <h2>My Appointments</h2>

        <table>

            <thead>

                <tr>

                    <th>Date</th>
                    <th>Time</th>
                    <th>Doctor</th>
                    <th>Department</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="appointmentsTable">

                <tr>

                    <td colspan="5">

                        No appointments found.

                    </td>

                </tr>

            </tbody>

        </table>

        <button id="backBtn">

            Back to Dashboard

        </button>

    </div>

</div>

<script>

document.getElementById("backBtn").addEventListener("click", () => {

    window.location.href = "dashboard.html";

});

</script>

<script type="module" src="appointments.js"></script>

</body>
</html>
