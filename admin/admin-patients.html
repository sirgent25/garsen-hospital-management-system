
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Patients Management | Garsen Hospital</title>

    <link rel="stylesheet" href="admin-patients.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>Admin Panel</h2>

        <ul>

            <li>
                <a href="admin-dashboard.html">
                    Dashboard
                </a>
            </li>

            <li class="active">
                <a href="admin-patients.html">
                    Patients
                </a>
            </li>

            <li>
                <a href="admin-doctors.html">
                    Doctors
                </a>
            </li>

            <li>
                <a href="admin-appointments.html">
                    Appointments
                </a>
            </li>

            <li>
                <a href="departments.html">
                    Departments
                </a>
            </li>

            <li>
                <a href="reports.html">
                    Reports
                </a>
            </li>

            <li>
                <a href="#" id="logoutBtn">
                    Logout
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="content">

        <div class="page-header">

            <h1>Patients Management</h1>

            <p>
                View and manage all registered patients.
            </p>

        </div>

        <!-- Statistics -->

        <div class="stats">

            <div class="stat-card">

                <h3>Total Patients</h3>

                <h2 id="totalPatients">0</h2>

            </div>

        </div>

        <!-- Search -->

        <div class="table-card">

            <div class="table-header">

                <h2>Registered Patients</h2>

                <input
                    type="text"
                    id="searchPatient"
                    placeholder="Search patient..."
                >

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Full Name</th>

                        <th>Email</th>

                        <th>Phone</th>

                        <th>Gender</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="patientsTable">

                    <tr>

                        <td colspan="5">

                            Loading patients...

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </main>

</div>

<script type="module" src="admin-patients.js"></script>

</body>
</html>
