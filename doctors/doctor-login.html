<!DOCTYPE html>
<html>
<head>
    <title>Doctor Login</title>
    <link rel="stylesheet" href="doctor-login.css">
</head>
<body>

<div class="container">

    <div class="login-box">

        <div class="logo-container">

            <img
                src="../images/logo.png"
                class="hospital-logo"
            >

            <h1>Garsen Hospital</h1>

            <p class="hospital-tagline">
                Doctor Portal
            </p>

        </div>

        <h2>Doctor Login</h2>

        <form id="doctorLoginForm">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>

<script
    type="module"
    src="doctor-login.js">
</script>

</body>
</html>
